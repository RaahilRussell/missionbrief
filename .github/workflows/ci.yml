name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "file:./dev.db"
      REPORT_ENGINE: "deterministic"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply schema + seed demo data
        run: |
          npm run db:push
          npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
